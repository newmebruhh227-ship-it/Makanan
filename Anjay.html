<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dapur Super Mama</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF5E62; --glass: rgba(0, 0, 0, 0.85); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Outfit', sans-serif; margin: 0; background: #000; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .bg-chef { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1556910103-1c02745aae4d?w=800'); background-size: cover; background-position: center; z-index: -1; }
        #app-container { width: 100%; max-width: 450px; height: 100vh; position: relative; background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(10px); overflow: hidden; }
        .page { position: absolute; width: 100%; height: 100%; padding: 20px; transition: all 0.4s ease-in-out; overflow-y: auto; opacity: 0; transform: scale(0.95); pointer-events: none; }
        .page.active { opacity: 1; transform: scale(1); pointer-events: all; }
        header { color: white; text-align: center; margin-bottom: 25px; padding-top: 10px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 80px; }
        .menu-card { background: var(--glass); border-radius: 18px; padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); color: white; text-align: center; }
        .menu-card span { font-size: 35px; }
        .recipe-item { background: white; border-radius: 20px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .recipe-img { width: 100%; height: 180px; object-fit: cover; }
        .recipe-info { padding: 15px; }
        .recipe-name { font-weight: 700; color: var(--primary); font-size: 18px; margin-bottom: 5px; display: block; }
        .recipe-desc { font-size: 13px; color: #444; line-height: 1.5; }
        .btn-back { background: white; color: black; border: none; padding: 10px 25px; border-radius: 50px; font-weight: 700; margin-bottom: 20px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .music-btn { position: fixed; bottom: 20px; right: 20px; background: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 100; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="bg-chef"></div>
<audio id="bgMusic" loop><source src="https://www.bensound.com/bensound-music/bensound-buddy.mp3" type="audio/mpeg"></audio>
<div class="music-btn" onclick="toggleMusic()" id="musicIcon">🔇</div>

<div id="app-container">
    <div class="page active" id="home">
        <header><h1>Menu Masakan Rumahan</h1><p style="color: #ccc;">90 Resep Spesial & Lengkap</p></header>
        <div class="menu-grid" id="main-menu"></div>
    </div>
    <div class="page" id="detail">
        <button class="btn-back" onclick="closeMenu()">⬅ Kembali</button>
        <h2 id="cat-title" style="color: white; margin-bottom: 20px;">Kategori</h2>
        <div id="recipe-list"></div>
    </div>
</div>

    const categories = [
        {k:'ayam', n:'Ayam', e:'🍗'}, {k:'ikan', n:'Ikan', e:'🐟'},
        {k:'cumi', n:'Cumi', e:'🦑'}, {k:'sapi', n:'Daging Sapi', e:'🥩'},
        {k:'kambing', n:'Daging Kambing', e:'🐐'}, {k:'sawi', n:'Sayur Sawi', e:'🥬'},
        {k:'telur', n:'Telur', e:'🥚'}, {k:'aci', n:'Jajanan Aci', e:'🍡'},
        {k:'bakso', n:'Bakso', e:'🍲'}
    ];

    const mainMenu = document.getElementById('main-menu');
    categories.forEach(c => {
        mainMenu.innerHTML += `<div class="menu-card" onclick="openMenu('${c.k}')"><span>${c.e}</span><b>${c.n}</b></div>`;
    });

    const music = document.getElementById('bgMusic');
    function toggleMusic() {
        if(music.paused) { music.play(); document.getElementById('musicIcon').innerText = "🔊"; }
        else { music.pause(); document.getElementById('musicIcon').innerText = "🔇"; }
    }

    function openMenu(cat) {
        const data = recipes[cat];
        document.getElementById('cat-title').innerText = data.t;
        const list = document.getElementById('recipe-list');
        list.innerHTML = '';
        data.v.forEach(r => {
            list.innerHTML += `
                <div class="recipe-item">
                    <img src="${r.img}" class="recipe-img">
                    <div class="recipe-info">
                        <span class="recipe-name">${r.n}</span>
                        <p class="recipe-desc"><b>🛒 Bahan:</b> ${r.i}</p>
                    </div>
                </div>`;
        });
        document.getElementById('home').classList.remove('active');
        document.getElementById('detail').classList.add('active');
    }

    function closeMenu() {
        document.getElementById('detail').classList.remove('active');
        document.getElementById('home').classList.add('active');
    }
</script>
</body>
</html>
